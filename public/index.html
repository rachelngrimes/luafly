<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Luafly Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #fff; font-family: monospace; }
    
    /* Login */
    #loginScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #0a0a0a; }
    #loginScreen h1 { font-size: 28px; color: #7ef7a0; margin-bottom: 24px; }
    #loginScreen input { width: 300px; padding: 10px; background: #111; border: 1px solid #333; border-radius: 6px; color: #fff; font-family: monospace; margin-bottom: 12px; }
    #loginScreen button { width: 300px; padding: 10px; background: #7ef7a0; color: #000; border: none; border-radius: 6px; cursor: pointer; font-family: monospace; font-weight: bold; }
    #loginError { color: #f77e7e; font-size: 13px; margin-top: 10px; }

    /* Layout */
    #mainContent { display: none; }
    .sidebar { width: 200px; background: #111; height: 100vh; position: fixed; top: 0; left: 0; padding: 24px 16px; border-right: 1px solid #222; }
    .sidebar h2 { color: #7ef7a0; font-size: 18px; margin-bottom: 24px; }
    .sidebar button { width: 100%; padding: 10px; background: transparent; color: #aaa; border: none; border-radius: 6px; cursor: pointer; font-family: monospace; text-align: left; margin-bottom: 6px; font-size: 13px; }
    .sidebar button:hover, .sidebar button.active { background: #1a1a1a; color: #fff; }
    .main { margin-left: 200px; padding: 32px; }
    .page { display: none; }
    .page.active { display: block; }
    h3 { font-size: 18px; margin-bottom: 20px; color: #7ef7a0; }

    /* Cards */
    .card { background: #111; border: 1px solid #222; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat { background: #111; border: 1px solid #222; border-radius: 10px; padding: 16px; text-align: center; }
    .stat .num { font-size: 28px; color: #7ef7a0; font-weight: bold; }
    .stat .label { font-size: 12px; color: #666; margin-top: 4px; }

    /* Inputs & Buttons */
    input, select, textarea { padding: 8px 10px; background: #0a0a0a; border: 1px solid #333; border-radius: 6px; color: #fff; font-family: monospace; font-size: 13px; }
    input:focus, select:focus { outline: none; border-color: #7ef7a0; }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-family: monospace; font-weight: bold; font-size: 13px; }
    .btn-green { background: #7ef7a0; color: #000; }
    .btn-red { background: #f77e7e; color: #000; }
    .btn-gray { background: #333; color: #fff; }
    .btn-blue { background: #7eb8f7; color: #000; }
    .row { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }

    /* Table */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { color: #7ef7a0; padding: 8px 10px; border-bottom: 1px solid #222; text-align: left; }
    td { padding: 8px 10px; border-bottom: 1px solid #1a1a1a; color: #ccc; }
    tr:hover td { background: #111; }
    .badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; }
    .whitelisted { background: #1a3a1a; color: #7ef7a0; }
    .blacklisted { background: #3a1a1a; color: #f77e7e; }
    .expired { background: #2a2a1a; color: #f7e07e; }
    .redeemed { background: #1a1a3a; color: #7eb8f7; }
    .unredeemed { background: #1a2a1a; color: #aaa; }

    /* Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; align-items: center; justify-content: center; }
    .modal.open { display: flex; }
    .modal-box { background: #111; border: 1px solid #333; border-radius: 10px; padding: 24px; width: 400px; }
    .modal-box h4 { color: #7ef7a0; margin-bottom: 16px; }
    .modal-box input, .modal-box select, .modal-box textarea { width: 100%; margin-bottom: 10px; }
    .modal-box textarea { height: 80px; resize: none; }
    .msg { font-size: 13px; color: #aaa; margin-top: 8px; }
  </style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <h1>Luafly</h1>
  <input id="passwordInput" type="password" placeholder="Enter password..." />
  <button onclick="checkPassword()">Login</button>
  <div id="loginError"></div>
</div>

<!-- Main -->
<div id="mainContent">
  <div class="sidebar">
    <h2>Luafly</h2>
    <button class="active" onclick="showPage('overview')">📊 Overview</button>
    <button onclick="showPage('users')">👤 Users</button>
    <button onclick="showPage('keys')">🔑 Keys</button>
    <button onclick="showPage('logs')">📋 Logs</button>
  </div>

  <div class="main">

    <!-- Overview -->
    <div id="page-overview" class="page active">
      <h3>Overview</h3>
      <div class="stats">
        <div class="stat"><div class="num" id="stat-total">0</div><div class="label">Total Users</div></div>
        <div class="stat"><div class="num" id="stat-whitelisted">0</div><div class="label">Whitelisted</div></div>
        <div class="stat"><div class="num" id="stat-blacklisted">0</div><div class="label">Blacklisted</div></div>
        <div class="stat"><div class="num" id="stat-executions">0</div><div class="label">Executions Today</div></div>
      </div>
    </div>

    <!-- Users -->
    <div id="page-users" class="page">
      <h3>Users</h3>
      <div class="card">
        <div class="row">
          <input id="u-hwid" placeholder="HWID" style="width:200px" />
          <input id="u-username" placeholder="Username" style="width:140px" />
          <select id="u-status">
            <option value="whitelisted">Whitelisted</option>
            <option value="blacklisted">Blacklisted</option>
          </select>
          <input id="u-notes" placeholder="Notes" style="width:140px" />
          <button class="btn btn-green" onclick="addUser()">Add</button>
        </div>
        <div class="msg" id="u-msg"></div>
      </div>
      <div class="card">
        <table>
          <thead><tr><th>Username</th><th>HWID</th><th>Status</th><th>Notes</th><th>Resets Left</th><th>Actions</th></tr></thead>
          <tbody id="users-table"></tbody>
        </table>
      </div>
    </div>

    <!-- Keys -->
    <div id="page-keys" class="page">
      <h3>Keys</h3>
      <div class="card">
        <div class="row">
          <select id="k-duration">
            <option value="7day">7 Days</option>
            <option value="30day">30 Days</option>
            <option value="lifetime">Lifetime</option>
          </select>
          <input id="k-amount" type="number" placeholder="Amount" value="1" style="width:80px" min="1" max="50" />
          <button class="btn btn-green" onclick="generateKeys()">Generate</button>
        </div>
        <div class="msg" id="k-msg"></div>
      </div>
      <div class="card">
        <table>
          <thead><tr><th>Key</th><th>Duration</th><th>Status</th><th>Redeemed By</th><th>Actions</th></tr></thead>
          <tbody id="keys-table"></tbody>
        </table>
      </div>
    </div>

    <!-- Logs -->
    <div id="page-logs" class="page">
      <h3>Logs</h3>
      <div class="card">
        <div class="row">
          <button class="btn btn-gray" onclick="loadLogs('all')">All</button>
          <button class="btn btn-gray" onclick="loadLogs('today')">Today</button>
          <button class="btn btn-gray" onclick="loadLogs('week')">This Week</button>
        </div>
      </div>
      <div class="card">
        <table>
          <thead><tr><th>Username</th><th>HWID</th><th>Action</th><th>Time</th></tr></thead>
          <tbody id="logs-table"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- Edit User Modal -->
<div class="modal" id="editModal">
  <div class="modal-box">
    <h4>Edit User</h4>
    <input id="edit-hwid" placeholder="HWID" readonly />
    <input id="edit-username" placeholder="Username" />
    <select id="edit-status">
      <option value="whitelisted">Whitelisted</option>
      <option value="blacklisted">Blacklisted</option>
    </select>
    <input id="edit-ban-reason" placeholder="Ban reason (if blacklisted)" />
    <textarea id="edit-notes" placeholder="Notes"></textarea>
    <input id="edit-resets" type="number" placeholder="HWID Resets Left" />
    <div class="row">
      <button class="btn btn-green" onclick="saveUser()">Save</button>
      <button class="btn btn-gray" onclick="closeModal()">Cancel</button>
      <button class="btn btn-red" onclick="deleteUser()">Delete</button>
    </div>
  </div>
</div>

<script>
  // Login
  async function checkPassword() {
    const input = document.getElementById("passwordInput").value;
    const res = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: input })
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("mainContent").style.display = "block";
      loadOverview();
      loadUsers();
    } else {
      document.getElementById("loginError").innerText = "Wrong password.";
    }
  }

  document.getElementById("passwordInput").addEventListener("keydown", e => {
    if (e.key === "Enter") checkPassword();
  });

  // Navigation
  function showPage(page) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.querySelectorAll(".sidebar button").forEach(b => b.classList.remove("active"));
    document.getElementById("page-" + page).classList.add("active");
    event.target.classList.add("active");
    if (page === "overview") loadOverview();
    if (page === "users") loadUsers();
    if (page === "keys") loadKeys();
    if (page === "logs") loadLogs("all");
  }

  // Overview
  async function loadOverview() {
    const [users, logs] = await Promise.all([
      fetch("/api/users").then(r => r.json()),
      fetch("/api/logs?filter=today").then(r => r.json())
    ]);
    document.getElementById("stat-total").innerText = users.length;
    document.getElementById("stat-whitelisted").innerText = users.filter(u => u.status === "whitelisted").length;
    document.getElementById("stat-blacklisted").innerText = users.filter(u => u.status === "blacklisted").length;
    document.getElementById("stat-executions").innerText = logs.filter(l => l.action === "executed").length;
  }

  // Users
  async function loadUsers() {
    const users = await fetch("/api/users").then(r => r.json());
    const tbody = document.getElementById("users-table");
    tbody.innerHTML = "";
    users.forEach(u => {
      tbody.innerHTML += `<tr>
        <td>${u.username || "-"}</td>
        <td style="font-size:11px">${u.hwid}</td>
        <td><span class="badge ${u.status}">${u.status}</span></td>
        <td>${u.notes || "-"}</td>
        <td>${u.hwid_resets_left ?? "-"}</td>
        <td><button class="btn btn-gray" onclick="openEdit(${JSON.stringify(u).split('"').join("'")})">Edit</button></td>
      </tr>`;
    });
  }

  async function addUser() {
    const hwid = document.getElementById("u-hwid").value.trim();
    const username = document.getElementById("u-username").value.trim();
    const status = document.getElementById("u-status").value;
    const notes = document.getElementById("u-notes").value.trim();
    if (!hwid) return setMsg("u-msg", "Enter a HWID.");
    const res = await fetch("/api/users", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ hwid, username, status, notes })
    });
    const data = await res.json();
    setMsg("u-msg", data.success ? "User added!" : data.error);
    loadUsers();
  }

  function openEdit(u) {
    if (typeof u === "string") u = JSON.parse(u.split("'").join('"'));
    document.getElementById("edit-hwid").value = u.hwid;
    document.getElementById("edit-username").value = u.username || "";
    document.getElementById("edit-status").value = u.status;
    document.getElementById("edit-ban-reason").value = u.ban_reason || "";
    document.getElementById("edit-notes").value = u.notes || "";
    document.getElementById("edit-resets").value = u.hwid_resets_left ?? 3;
    document.getElementById("editModal").classList.add("open");
  }

  function closeModal() {
    document.getElementById("editModal").classList.remove("open");
  }

  async function saveUser() {
    const hwid = document.getElementById("edit-hwid").value;
    const res = await fetch("/api/users", {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        hwid,
        username: document.getElementById("edit-username").value,
        status: document.getElementById("edit-status").value,
        ban_reason: document.getElementById("edit-ban-reason").value,
        notes: document.getElementById("edit-notes").value,
        hwid_resets_left: parseInt(document.getElementById("edit-resets").value)
      })
    });
    const data = await res.json();
    if (data.success) { closeModal(); loadUsers(); }
  }

  async function deleteUser() {
    const hwid = document.getElementById("edit-hwid").value;
    await fetch("/api/users", {
      method: "DELETE",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ hwid })
    });
    closeModal();
    loadUsers();
  }

  // Keys
  async function loadKeys() {
    const keys = await fetch("/api/keys").then(r => r.json());
    const tbody = document.getElementById("keys-table");
    tbody.innerHTML = "";
    keys.forEach(k => {
      tbody.innerHTML += `<tr>
        <td style="font-size:11px">${k.key}</td>
        <td>${k.duration}</td>
        <td><span class="badge ${k.redeemed ? "redeemed" : "unredeemed"}">${k.redeemed ? "Redeemed" : "Available"}</span></td>
        <td>${k.redeemed_by || "-"}</td>
        <td><button class="btn btn-red" onclick="deleteKey('${k.key}')">Delete</button></td>
      </tr>`;
    });
  }

  async function generateKeys() {
    const duration = document.getElementById("k-duration").value;
    const amount = document.getElementById("k-amount").value;
    const res = await fetch("/api/keys", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ duration, amount: parseInt(amount) })
    });
    const data = await res.json();
    setMsg("k-msg", data.success ? `Generated ${data.keys.length} key(s)!` : data.error);
    loadKeys();
  }

  async function deleteKey(key) {
    await fetch("/api/keys", {
      method: "DELETE",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ key })
    });
    loadKeys();
  }

  // Logs
  async function loadLogs(filter) {
    const logs = await fetch(`/api/logs?filter=${filter}`).then(r => r.json());
    const tbody = document.getElementById("logs-table");
    tbody.innerHTML = "";
    logs.forEach(l => {
      tbody.innerHTML += `<tr>
        <td>${l.username || "-"}</td>
        <td style="font-size:11px">${l.hwid}</td>
        <td>${l.action}</td>
        <td>${new Date(l.timestamp).toLocaleString()}</td>
      </tr>`;
    });
  }

  function setMsg(id, text) {
    document.getElementById(id).innerText = text;
  }
</script>
</body>
</html>
